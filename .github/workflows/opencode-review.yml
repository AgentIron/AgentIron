name: OpenCode PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: z.ai/glm-5.1
          use_github_token: true
          prompt: |
            Perform a comprehensive code review of this pull request with the following priorities:

            1. **Security**: Check for potential security vulnerabilities, injection risks, 
               unsafe dependencies, or exposed secrets
            2. **Architecture**: Evaluate code structure, separation of concerns, and design patterns
            3. **Best Practices**: Verify error handling, logging, testing coverage, and performance considerations

            For style and formatting issues:
            - Comment on them inline if found
            - But do NOT block approval for minor style/formatting concerns
            - Focus on substantive issues that affect correctness or maintainability

            Provide your review as:
            - Inline comments on specific lines where issues exist
            - A summary comment on the PR with overall assessment
            - Clearly distinguish between "must fix" (blocking) and "suggested" (non-blocking) issues

            If no critical issues are found, indicate that the PR is approved from a code review perspective.
