name: PR Agent (Gemini)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request, respond to user comments
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "gemini/gemini-3-flash-preview"
          config.fallback_models: '["gemini/gemini-3-flash-preview"]'
          config.ai_timeout: "300"
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          config.publish_output: "true"
          pr_code_suggestions.commitable_code_suggestions: "true"
          pr_code_suggestions.dual_publishing_score_threshold: "0"
          github.publish_inline_comments_fallback_with_verification: "true"
          github.try_fix_invalid_inline_comments: "true"
