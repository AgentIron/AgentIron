name: Pull Request

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR source branch
        run: |
          if [[ "${{ github.head_ref }}" == "main" ]]; then
            echo "ERROR: PRs must come from a feature branch, not main"
            exit 1
          fi
          echo "✓ PR comes from feature branch: ${{ github.head_ref }}"

      - name: Check issue reference
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          
          if echo "$PR_TITLE $PR_BODY" | grep -qiE '(closes?|fixes?|resolves?)\s*#[0-9]+'; then
            echo "✓ Issue reference found"
          else
            echo "ERROR: PR must reference a GitHub issue using 'Closes #123', 'Fixes #456', etc."
            echo "Please update the PR title or description to include an issue reference."
            exit 1
          fi

  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cd src-tauri && cargo fmt -- --check

      - name: Run clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Build Rust
        run: cd src-tauri && cargo build

      - name: Run Rust tests
        run: cd src-tauri && cargo test

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '9'

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm run lint

      - name: Build frontend
        run: pnpm run build
