const svg = d3.select("#graph").append("svg");
const g = svg.append("g");
const tooltip = document.getElementById("tooltip");
const search = document.getElementById("search");

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(80))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(window.innerWidth/2, window.innerHeight/2))
  .force("collision", d3.forceCollide().radius(d => Math.sqrt(d.degree)*3 + 5));

const link = g.selectAll(".link").data(edges).join("line").attr("class","link");

const node = g.selectAll(".node").data(nodes).join("g").attr("class","node");
node.append("circle")
  .attr("r", d => Math.sqrt(d.degree)*2.5 + 3)
  .attr("fill", d => d.color)
  .attr("opacity", 0.85);
node.append("text").text(d => d.label.length > 20 ? d.label.slice(0,20)+"\u2026" : d.label)
  .attr("dx", d => Math.sqrt(d.degree)*2.5 + 6)
  .attr("dy", 4);

node.on("mouseover", (ev, d) => {
  const conns = edges.filter(e => e.source.id === d.id || e.target.id === d.id).length;
  tooltip.innerHTML = "<b>" + d.label + "</b><br>Degree: " + d.degree + " | Community: " + (d.group + 1) + "<br>Connections: " + conns;
  tooltip.style.display = "block";
})
.on("mousemove", (ev) => {
  tooltip.style.left = (ev.clientX + 12) + "px";
  tooltip.style.top = (ev.clientY + 12) + "px";
})
.on("mouseout", () => { tooltip.style.display = "none"; });

simulation.on("tick", () => {
  link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
});

svg.call(d3.zoom().on("zoom", (ev) => g.attr("transform", ev.transform)));

search.addEventListener("input", () => {
  const q = search.value.toLowerCase();
  node.select("circle").attr("opacity", d => !q || d.label.toLowerCase().includes(q) ? 0.95 : 0.1);
  node.select("text").attr("opacity", d => !q || d.label.toLowerCase().includes(q) ? 1 : 0.05);
  link.attr("stroke-opacity", d => {
    if (!q) return 0.4;
    const s = typeof d.source === "object" ? d.source : nodes.find(n => n.id === d.source);
    const t = typeof d.target === "object" ? d.target : nodes.find(n => n.id === d.target);
    return (s.label.toLowerCase().includes(q) || t.label.toLowerCase().includes(q)) ? 0.6 : 0.03;
  });
});
